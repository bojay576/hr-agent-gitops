<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Assistant</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #f0f2f5; height: 100vh; display: flex; justify-content: center; align-items: center;
  }
  .app {
    width: 100%; max-width: 800px; height: 100vh; max-height: 720px;
    background: #fff; border-radius: 16px; box-shadow: 0 8px 40px rgba(0,0,0,0.08);
    display: flex; flex-direction: column; overflow: hidden;
    margin: 16px;
  }
  header {
    background: linear-gradient(135deg, #4f6ef7, #6c5ce7);
    color: #fff; padding: 18px 24px; display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  header .avatar {
    width: 36px; height: 36px; background: rgba(255,255,255,0.2);
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  header .title { font-size: 17px; font-weight: 600; }
  header .subtitle { font-size: 12px; opacity: 0.8; margin-top: 2px; }

  .messages {
    flex: 1; overflow-y: auto; padding: 20px 24px;
    display: flex; flex-direction: column; gap: 16px;
    scroll-behavior: smooth;
  }
  .messages:empty::after {
    content: '输入您的问题，开始与 HR 助手对话';
    display: block; text-align: center; color: #bbb; font-size: 15px; margin-top: 40px;
  }

  .msg { display: flex; gap: 10px; max-width: 85%; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.assistant { align-self: flex-start; }

  .msg .bubble {
    padding: 12px 16px; border-radius: 16px; line-height: 1.6; font-size: 14px; word-break: break-word;
    position: relative;
  }
  .msg.user .bubble {
    background: #4f6ef7; color: #fff; border-bottom-right-radius: 4px;
  }
  .msg.assistant .bubble {
    background: #f0f2f5; color: #1a1a2e; border-bottom-left-radius: 4px;
  }
  .msg.assistant .bubble p { margin: 0 0 8px; }
  .msg.assistant .bubble p:last-child { margin-bottom: 0; }

  .msg .avatar-icon {
    width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 16px;
    margin-top: 4px;
  }
  .msg.user .avatar-icon { background: #e8ecff; color: #4f6ef7; }
  .msg.assistant .avatar-icon { background: #e8ecff; color: #6c5ce7; }

  /* typing indicator */
  .typing .bubble { display: flex; gap: 5px; align-items: center; padding: 16px 20px; }
  .typing .dot {
    width: 8px; height: 8px; border-radius: 50%; background: #aaa;
    animation: bounce 1.4s infinite ease-in-out both;
  }
  .typing .dot:nth-child(1) { animation-delay: -0.32s; }
  .typing .dot:nth-child(2) { animation-delay: -0.16s; }
  .typing .dot:nth-child(3) { animation-delay: 0s; }
  @keyframes bounce { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }

  /* markdown styling */
  .msg.assistant .bubble pre {
    background: #1e1e2e; color: #cdd6f4; padding: 12px 16px; border-radius: 10px;
    overflow-x: auto; font-size: 13px; line-height: 1.5; margin: 8px 0;
    font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
  }
  .msg.assistant .bubble code {
    background: rgba(0,0,0,0.06); padding: 2px 6px; border-radius: 4px; font-size: 13px;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
  }
  .msg.assistant .bubble pre code { background: none; padding: 0; }
  .msg.assistant .bubble ul, .msg.assistant .bubble ol { padding-left: 20px; margin: 8px 0; }
  .msg.assistant .bubble li { margin: 4px 0; }
  .msg.assistant .bubble strong { font-weight: 600; }
  .msg.assistant .bubble h1, .msg.assistant .bubble h2, .msg.assistant .bubble h3 { margin: 12px 0 6px; }
  .msg.assistant .bubble table { border-collapse: collapse; margin: 8px 0; font-size: 13px; width: 100%; }
  .msg.assistant .bubble th, .msg.assistant .bubble td { border: 1px solid #ddd; padding: 6px 10px; text-align: left; }
  .msg.assistant .bubble th { background: #e8ecff; font-weight: 600; }

  .input-area {
    padding: 16px 24px 20px; border-top: 1px solid #f0f0f0;
    display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0;
  }
  .input-area textarea {
    flex: 1; border: 1px solid #e0e0e0; border-radius: 12px; padding: 12px 16px;
    font-size: 14px; font-family: inherit; resize: none; outline: none;
    min-height: 48px; max-height: 120px; line-height: 1.5;
    transition: border-color 0.2s;
  }
  .input-area textarea:focus { border-color: #4f6ef7; box-shadow: 0 0 0 3px rgba(79,110,247,0.1); }
  .input-area textarea::placeholder { color: #bbb; }

  .input-area button {
    background: #4f6ef7; color: #fff; border: none; border-radius: 12px;
    padding: 12px 24px; font-size: 14px; font-weight: 500; cursor: pointer;
    transition: background 0.2s; white-space: nowrap; height: 48px;
  }
  .input-area button:hover { background: #3d5bd9; }
  .input-area button:disabled { background: #b0b8f0; cursor: not-allowed; }

  .error-msg {
    background: #fff0f0; color: #d63031; padding: 8px 12px; border-radius: 8px;
    font-size: 13px; text-align: center; margin: 4px 0;
  }

  @media (max-width: 640px) {
    .app { max-height: none; border-radius: 0; margin: 0; }
    .messages { padding: 16px; }
    .msg { max-width: 92%; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="avatar">🤖</div>
    <div>
      <div class="title">HR Assistant</div>
      <div class="subtitle">智能人力资源管理 · MCP 驱动</div>
    </div>
  </header>

  <div id="messages" class="messages"></div>

  <div class="input-area">
    <textarea id="input" rows="1" placeholder="输入您的问题，如：查询所有员工..." maxlength="2000"></textarea>
    <button id="send">发送</button>
  </div>
</div>

<script>
(function() {
  const el = id => document.getElementById(id);
  const messagesEl = el('messages');
  const inputEl = el('input');
  const sendBtn = el('send');

  // ---- Markdown 渲染 ----
  function renderMarkdown(text) {
    // 先转义 HTML
    let html = text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    // 代码块 ``` ... ```
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
      const c = code.replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>');
      return `<pre><code>${escHtml(c)}</code></pre>`;
    });

    // 行内代码
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

    // 加粗
    html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

    // 逐行处理：表格、标题、普通文本（加<br>）
    const lines = html.split('\n');
    const out = [];
    let inTable = false;

    for (const line of lines) {
      const t = line.trim();

      // ----- 表格行 -----
      if (/^\|.+\|$/.test(t)) {
        const cells = t.slice(1, -1).split('|').map(c => c.trim());

        // 分隔行 |---|---| ，忽略
        if (cells.every(c => /^-+$/.test(c))) {
          if (inTable) out.push('</thead><tbody>');
          continue;
        }

        if (!inTable) {
          inTable = true;
          out.push('<table><thead><tr>');
          cells.forEach(c => out.push('<th>' + c + '</th>'));
          out.push('</tr></thead><tbody>');
        } else {
          out.push('<tr>');
          cells.forEach(c => out.push('<td>' + c + '</td>'));
          out.push('</tr>');
        }
        continue;
      }

      // ----- 非表格行：关闭表格 -----
      if (inTable) {
        out.push('</tbody></table>');
        inTable = false;
      }

      // ----- 标题 ## xxx -----
      const hm = line.match(/^(#{1,3})\s+(.*)/);
      if (hm) {
        out.push('<h' + hm[1].length + '>' + hm[2] + '</h' + hm[1].length + '>');
        continue;
      }

      // ----- 普通文本行：加 <br> 换行 -----
      // 只有在这里加 <br>，表格和标题内部不会混入
      out.push(line + '<br>');
    }

    if (inTable) out.push('</tbody></table>');

    return out.join('\n');
  }

  function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // ---- 添加消息 ----
  function addMessage(role, content, isError) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    if (isError) div.className += ' error';

    const avatar = role === 'user' ? '👤' : '🤖';
    div.innerHTML = `
      <div class="avatar-icon">${avatar}</div>
      <div class="bubble">${role === 'user' ? escHtml(content) : renderMarkdown(content)}</div>
    `;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'msg assistant typing';
    div.id = 'typing-indicator';
    div.innerHTML = `
      <div class="avatar-icon">🤖</div>
      <div class="bubble">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>
    `;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    // 清除空状态提示
    if (messagesEl.querySelector('.empty-hint')) messagesEl.querySelector('.empty-hint').remove();
  }

  function removeTyping() {
    const t = el('typing-indicator');
    if (t) t.remove();
  }

  // ---- 发送消息 ----
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    addMessage('user', text);
    sendBtn.disabled = true;
    showTyping();

    try {
      const resp = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });

      removeTyping();

      if (!resp.ok) {
        let errMsg = `请求失败 (HTTP ${resp.status})`;
        try { const d = await resp.json(); errMsg = d.error || errMsg; } catch {}
        addMessage('assistant', `❌ ${errMsg}`, true);
        return;
      }

      const data = await resp.json();
      const reply = data.message?.content || '(空回复)';
      addMessage('assistant', reply);
      document.querySelector('.messages:empty::after')?.remove();

    } catch (err) {
      removeTyping();
      addMessage('assistant', `❌ 网络错误: ${err.message}`, true);
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  // ---- 事件绑定 ----
  sendBtn.addEventListener('click', sendMessage);

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // 自动调整输入框高度
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  // ---- 欢迎消息 ----
  addMessage('assistant', '你好！我是 **数据库助手**。\n\n我可以帮你查询和管理 MySQL 数据库。\n\n**示例：**\n- 查看数据库表结构\n- 查询所有员工和他们所在部门\n- Engineering 部门有哪些员工？\n- 薪资最高的员工是谁？\n\n**连接你自己的数据库：**\n直接在对话中说：\n> 连接到我的数据库 root:密码@tcp(192.168.1.100:3306)/mydb\n\n切换后就能对你的数据库进行对话式增删改查 👇');

  inputEl.focus();
})();
</script>
</body>
</html>
